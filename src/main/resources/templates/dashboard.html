<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineMax - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <h2>Panel Principal</h2>
                <a th:href="@{/}" class="btn btn-outline-danger">Cerrar Sesión</a>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">Mantenimiento de Películas</h5>
                        <p class="card-text">Agrega, edita y filtra el catálogo de películas.</p>
                        <a th:href="@{/cine/peliculas}" class="btn btn-light">Ir a Cartelera</a>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 mb-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">Punto de Venta (Taquilla)</h5>
                        <p class="card-text">Registra ventas y asigna asientos a las funciones.</p>
                        <a th:href="@{/cine/venta/nuevo}" class="btn btn-light">Abrir Taquilla</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:utext="${alert}"></th:block>
</body>
</html>
