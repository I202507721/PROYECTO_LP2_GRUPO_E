<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CineMax - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/cinemax.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-shell {
            width: 100%;
            max-width: 420px;
        }
        .login-marquee {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-marquee .cm-brand {
            font-size: 2.6rem;
            line-height: 1;
        }
        .login-marquee .tagline {
            color: var(--cm-cream-dim);
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .login-header {
            text-align: center;
            font-family: var(--cm-display);
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            color: var(--cm-cream);
            text-transform: uppercase;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--cm-line);
        }
    </style>
</head>

<body>
    <div class="login-shell">

        <div class="login-marquee">
            <div class="cm-brand">🎬 CINE<span class="accent">MAX</span></div>
            <div class="tagline">Sistema de Boletería</div>
        </div>

        <div class="cm-ticket">
            <div class="login-header">Acceso al Sistema</div>

            <form th:action="@{/login/iniciar-sesion}" method="get" th:object="${filter}">
                <div class="cm-field">
                    <label class="cm-label" for="username">Usuario</label>
                    <div class="cm-input-group">
                        <span class="cm-input-group-icon"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="username" class="cm-input" placeholder="Ingrese su usuario" th:field="*{username}" required>
                    </div>
                </div>

                <div class="cm-field">
                    <label class="cm-label" for="password">Contraseña</label>
                    <div class="cm-input-group">
                        <span class="cm-input-group-icon"><i class="fa-solid fa-key"></i></span>
                        <input type="password" id="password" class="cm-input" placeholder="Ingrese su contraseña" th:field="*{password}" required>
                    </div>
                </div>

                <button type="submit" class="cm-btn cm-btn-gold cm-btn-lg cm-btn-block" style="margin-top: 10px;">
                    <i class="fas fa-sign-in-alt"></i> INGRESAR
                </button>
            </form>
        </div>

        <div class="cm-footer-note">&copy; 2026 CineMax — Todos los derechos reservados</div>
    </div>

    <th:block th:utext="${alert}"></th:block>
</body>

</html>
