<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineMax - Nueva Película</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/cinemax.css}">
</head>
<body>

<div class="cm-container" style="max-width: 620px;">

    <div class="cm-brand" style="font-size: 1.3rem; margin-bottom: 18px;">🎬 CINE<span class="accent">MAX</span></div>

    <div class="cm-card">
        <h2 class="cm-mt-0" style="border-bottom: 1px solid var(--cm-line); padding-bottom: 16px; margin-bottom: 24px;">
            <i class="fas fa-film" style="font-size: 0.8em;"></i> Registrar Nueva Película
        </h2>

        <div th:if="${error}" class="cm-alert cm-alert-error" th:text="${error}"></div>

        <form th:action="@{/cine/pelicula/guardar}" th:object="${pelicula}" method="post">

            <div class="cm-field">
                <label class="cm-label" for="titulo">Título de la Película</label>
                <input type="text" id="titulo" class="cm-input" th:field="*{titulo}" required placeholder="Ej: Avengers: Endgame">
            </div>

            <div class="cm-field">
                <label class="cm-label" for="genero">Género</label>
                <input type="text" id="genero" class="cm-input" th:field="*{genero}" required placeholder="Ej: Acción">
            </div>

            <div class="cm-field">
                <label class="cm-label" for="duracion">Duración (minutos)</label>
                <input type="number" id="duracion" class="cm-input" th:field="*{duracion}" required min="1">
            </div>

            <div class="cm-field">
                <label class="cm-label" for="clasificacion">Clasificación</label>
                <select id="clasificacion" class="cm-select" th:field="*{clasificacion}" required>
                    <option value="">-- Seleccione --</option>
                    <option value="ATP">Apta para Todos (ATP)</option>
                    <option value="PG-13">Mayores de 13 (PG-13)</option>
                    <option value="Mayores 14">Mayores de 14</option>
                    <option value="Mayores 18">Mayores de 18</option>
                </select>
            </div>

            <div class="cm-flex-between" style="margin-top: 28px;">
                <a th:href="@{/cine/peliculas}" class="cm-btn cm-btn-ghost">Cancelar</a>
                <button type="submit" class="cm-btn cm-btn-gold"><i class="fas fa-save"></i> Guardar Película</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
