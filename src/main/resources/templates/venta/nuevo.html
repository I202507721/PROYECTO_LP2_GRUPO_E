<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layoutBase(~{::contenido})">

<div th:fragment="contenido">
    <div class="cm-ticket" style="max-width: 820px; margin: 0 auto;">
        <h2 class="cm-mt-0" style="border-bottom: 1px solid var(--cm-line); padding-bottom: 16px; margin-bottom: 24px;">
            <i class="fas fa-ticket-alt" style="font-size: 0.8em;"></i> Taquilla — Registro de Venta
        </h2>

        <form th:action="@{/cine/venta/guardar}" method="post" id="formVenta">

            <div class="cm-field">
                <label class="cm-label" for="idPelicula">1. Seleccione la Película</label>
                <select id="idPelicula" class="cm-select" required>
                    <option value="">-- Seleccione una Película --</option>
                    <option th:each="p : ${peliculas}"
                            th:value="${p.idPelicula}"
                            th:text="${p.titulo}">
                    </option>
                </select>
            </div>

            <div class="cm-field">
                <label class="cm-label" for="idFuncion">2. Seleccione la Función</label>
                <select name="idFuncion" id="idFuncion" class="cm-select" required disabled>
                    <option value="" data-precio="0">-- Seleccione una película primero --</option>
                </select>
            </div>

            <div class="cm-flex-between cm-gap-sm" style="align-items: flex-start;">
                <div class="cm-field" style="flex: 1;">
                    <label class="cm-label" for="cantidad">3. Cantidad de Entradas</label>
                    <input type="number" name="cantidad" id="cantidad" class="cm-input" required min="1" max="10" placeholder="Ej: 2" disabled>
                </div>

                <div class="cm-field" style="flex: 1;">
                    <label class="cm-label">4. Total a Cobrar</label>
                    <div style="background: var(--cm-charcoal); border: 1px solid var(--cm-gold); border-radius: var(--cm-radius-sm); padding: 10px 14px; color: var(--cm-gold-bright); font-size: 1.4rem; font-family: var(--cm-display); text-align: right;">
                        S/. <span id="lblTotal">0.00</span>
                    </div>
                </div>
            </div>

            <div class="cm-field">
                <label class="cm-label" for="asientos">5. Códigos de Asientos</label>
                <input type="text" name="asientos" id="asientos" class="cm-input" required placeholder="Ej: A1,A2" disabled>
                <div class="cm-info-panel">
                    <i class="fas fa-info-circle"></i> Escriba los asientos separados por comas. Deben coincidir con la cantidad ingresada.
                </div>
            </div>

            <div class="cm-flex-between" style="margin-top: 30px;">
                <a th:href="@{/dashboard}" class="cm-btn cm-btn-ghost">Cancelar</a>
                <button type="button" id="btnProcesar" class="cm-btn cm-btn-gold cm-btn-lg" disabled><i class="fas fa-check"></i> Emitir Boleto</button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const selectPelicula = document.getElementById("idPelicula");
            const selectFuncion = document.getElementById("idFuncion");
            const inputCantidad = document.getElementById("cantidad");
            const inputAsientos = document.getElementById("asientos");
            const lblTotal = document.getElementById("lblTotal");
            const btnProcesar = document.getElementById("btnProcesar");
            const formVenta = document.getElementById("formVenta");

            function calcularTotal() {
                const opcionSeleccionada = selectFuncion.options[selectFuncion.selectedIndex];
                const precio = opcionSeleccionada ? parseFloat(opcionSeleccionada.getAttribute("data-precio")) || 0 : 0;
                const cantidad = parseInt(inputCantidad.value) || 0;
                lblTotal.textContent = (precio * cantidad).toFixed(2);
            }

            selectPelicula.addEventListener("change", function() {
                const peliculaId = this.value;
                
                selectFuncion.innerHTML = '<option value="" data-precio="0">-- Cargando funciones... --</option>';
                selectFuncion.disabled = true;
                inputCantidad.disabled = true;
                inputAsientos.disabled = true;
                btnProcesar.disabled = true;
                inputCantidad.value = '';
                inputAsientos.value = '';
                calcularTotal();

                if (peliculaId) {
                    fetch('/cine/venta/funciones-por-pelicula?idPelicula=' + peliculaId)
                        .then(response => response.json())
                        .then(data => {
                            selectFuncion.innerHTML = '<option value="" data-precio="0">-- Seleccione una función --</option>';
                            
                            if (data.length > 0) {
                                data.forEach(f => {
                                    const option = document.createElement("option");
                                    option.value = f.idFuncion;
                                    option.setAttribute("data-precio", f.precio);
                                    option.textContent = f.texto;
                                    selectFuncion.appendChild(option);
                                });
                                selectFuncion.disabled = false;
                            } else {
                                selectFuncion.innerHTML = '<option value="" data-precio="0">-- No hay funciones programadas --</option>';
                            }
                        })
                        .catch(error => {
                            console.error('Error al cargar funciones:', error);
                            selectFuncion.innerHTML = '<option value="" data-precio="0">-- Error al cargar --</option>';
                        });
                } else {
                    selectFuncion.innerHTML = '<option value="" data-precio="0">-- Seleccione una película primero --</option>';
                }
            });

            selectFuncion.addEventListener("change", function() {
                const tieneFuncion = this.value !== "";
                inputCantidad.disabled = !tieneFuncion;
                inputAsientos.disabled = !tieneFuncion;
                btnProcesar.disabled = !tieneFuncion;
                calcularTotal();
            });

            inputCantidad.addEventListener("input", calcularTotal);

            btnProcesar.addEventListener("click", function() {
                const cantidad = parseInt(inputCantidad.value) || 0;
                const asientosTexto = inputAsientos.value.trim();
                
                if (cantidad <= 0 || selectFuncion.value === "") {
                    Swal.fire('Atención', 'Debe seleccionar una función y una cantidad válida.', 'warning');
                    return;
                }

                const arrayAsientos = asientosTexto.split(",").filter(a => a.trim() !== "");
                if (arrayAsientos.length !== cantidad) {
                    Swal.fire('Error en Asientos', `Ha solicitado ${cantidad} entradas, pero ingresó ${arrayAsientos.length} asientos.`, 'error');
                    return;
                }

                formVenta.submit();
            });
        });
    </script>
</div>
</html>
