<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineMax - Taquilla (Ventas)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/cinemax.css}">
</head>
<body>

<div class="cm-container" style="max-width: 1100px;">

	<div class="cm-topbar">
	    <div>
	        <div class="cm-brand">🎬 CINE<span class="accent">MAX</span></div>
	        <div style="font-size: 0.85rem; color: var(--cm-cream-dim); margin-top: 4px;">
	            Bienvenido, <span style="color: var(--cm-gold-bright); font-weight: 600;" th:text="${session.fullName}"></span> 
	            (<span th:text="${session.rol}"></span>)
	        </div>
	    </div>
	    <div class="cm-flex-between cm-gap-sm" style="width: auto;">
	        <a th:href="@{/dashboard}" class="cm-btn cm-btn-ghost"><i class="fas fa-home"></i> Inicio</a>
	        <button id="btnCerrarSesion" class="cm-btn cm-btn-red"><i class="fas fa-sign-out-alt"></i> Salir</button>
	    </div>
	</div>
    <div class="cm-ticket">
        <h2 class="cm-mt-0" style="border-bottom: 1px solid var(--cm-line); padding-bottom: 16px; margin-bottom: 24px;">
            <i class="fas fa-ticket-alt" style="font-size: 0.8em;"></i> Taquilla — Registro de Venta
        </h2>

        <div th:if="${mensajeExito}" class="cm-alert cm-alert-success" th:text="${mensajeExito}"></div>
        <div th:if="${mensajeError}" class="cm-alert cm-alert-error" th:text="${mensajeError}"></div>

        <form th:action="@{/cine/venta/guardar}" method="post">

			<div class="cm-field">
			                <label class="cm-label" for="idFuncion">1. Seleccione la Función</label>
			                <select name="idFuncion" id="idFuncion" class="cm-select" required>
			                    <option value="" data-precio="0">-- Seleccione una función en cartelera --</option>
			                    
			                    <option th:each="f : ${funciones}"
			                            th:value="${f.idFuncion}"
			                            th:data-precio="${f.precioEntrada}"
			                            th:text="|${f.pelicula.titulo} (Sala ${f.sala.numeroSala}) - ${f.horaInicio} - Asientos Libres: ${f.asientosDisponibles} (S/. ${f.precioEntrada})|">
			                    </option>
			                </select>
			            </div>

            <div class="cm-field">
                <label class="cm-label" for="cantidad">Cantidad de Entradas</label>
                <input type="number" name="cantidad" id="cantidad" class="cm-input" required min="1" max="10" placeholder="Ej: 2">
            </div>

            <div class="cm-field">
                <label class="cm-label" for="asientos">Códigos de Asientos (separados por coma)</label>
                <input type="text" name="asientos" id="asientos" class="cm-input" required placeholder="Ej: A1,A2,B5">
                <div class="cm-info-panel">
                    <i class="fas fa-info-circle"></i> Asegúrese de ingresar tantos códigos de asiento como entradas solicitadas.
                </div>
            </div>

            <div class="cm-flex-between" style="margin-top: 30px;">
                <a th:href="@{/cine/peliculas}" class="cm-btn cm-btn-ghost">Volver a Cartelera</a>
                <button type="submit" class="cm-btn cm-btn-gold cm-btn-lg"><i class="fas fa-check"></i> Procesar Venta</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
